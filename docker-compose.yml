version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gr-attitude-db
    environment:
      POSTGRES_DB: gr_attitude
      POSTGRES_USER: gr_user
      POSTGRES_PASSWORD: gr_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gr-attitude-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
